server {
    listen 80;
    server_name _;

    # React static files
    root /var/www/html;
    index index.html;

    # Increase timeouts for streaming responses (essay evaluation)
    # Without this, Nginx will cut off SSE streams after 60s
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;

    # FastAPI backend — all /api/* routes
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for Server-Sent Events (streaming essay feedback)
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # MCP server endpoint
    location /mcp-server/ {
        proxy_pass http://127.0.0.1:8000/mcp-server/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
    }

    # React Router — serve index.html for all non-API routes
    # This is required for client-side routing to work
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    # Gzip compression for static assets
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml
               application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
}
