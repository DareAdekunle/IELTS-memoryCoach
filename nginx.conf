# HTTP — redirect all traffic to HTTPS
server {
    listen 80;
    server_name ielts.qonda.xyz;

    # Allow Certbot renewal challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server
server {
    listen 443 ssl;
    server_name ielts.qonda.xyz;

    # SSL certificates from Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/ielts.qonda.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ielts.qonda.xyz/privkey.pem;

    # SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # React static files
    root /var/www/html;
    index index.html;

    # Increase timeouts for streaming responses (essay evaluation)
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;

    # FastAPI backend — all /api/* routes
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for Server-Sent Events (streaming essay feedback)
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # MCP server endpoint
    location /mcp-server/ {
        proxy_pass http://127.0.0.1:8000/mcp-server/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
    }

    # React Router — serve index.html for all non-API routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    # Gzip compression for static assets
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml
               application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
}
